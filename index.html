<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIONRACK 产品目录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 30px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .title {
            text-align: center;
            font-size: 26px;
            margin-bottom: 20px;
            color: #222;
        }

        /* 导航栏 */
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .nav button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: white;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 2px 5px #00000010;
        }
        .nav button.active {
            background: #409eff;
            color: white;
        }

        /* 页面内容 */
        .page {
            display: none;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 10px #0000000a;
        }
        .page.active {
            display: block;
        }

        /* 目录按钮样式 */
        .item {
            display: block;
            padding: 18px 22px;
            margin-bottom: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            border-left: 4px solid #409eff;
        }
    </style>
</head>

<body>
    <h2 class="title">📚 ORIONRACK 产品目录</h2>

    <!-- 导航 -->
    <div class="nav">
        <button onclick="openPage(0)" class="active">English-中文 catalog</button>
        <button onclick="openPage(1)">Русский язык-English catalog</button>
        <button onclick="openPage(2)">Vedio</button>
          </div>

    <!-- 页面1 -->
    <div class="page active">
        <a class="item" href="https://online.fliphtml5.com/ORIONRACK/uwqd/" target="_blank">📖 Racking system 仓储货架</a>
        <a class="item" href="https://online.fliphtml5.com/ORIONRACK/vjbd/" target="_blank">📖 Storage equipment 仓储设备</a>
        <a class="item" href="https://online.fliphtml5.com/ORIONRACK/fafe/" target="_blank">📖  Product introduction 产品简介</a>
        <a class="item" href="https://online.fliphtml5.com/ORIONRACK/limj/" target="_blank">📖  Radio-shuttle Rack 穿梭式货架</a>
    </div>

    <!-- 页面2 -->
     <div class="page active">
        <a class="item" href="https://online.fliphtml5.com/ORIONRACK/aylk/" target="_blank">📖 Складские стеллажи Racking System</a>
        <a class="item" href="https://online.fliphtml5.com/ORIONRACK/avbj/" target="_blank">📖 Складское оборудование Storage Equipment</a>
        <a class="item" href="https://online.fliphtml5.com/ORIONRACK/zsxj/" target="_blank">📖  Обзор продукта Product introduction</a>
        <a class="item" href="https://online.fliphtml5.com/ORIONRACK/oipy/" target="_blank">📖  Шаттловые стеллажи Radio shuttle Rack</a>
    </div>


    <!-- 页面3 -->
    <div class="page">
        <a class="item" href="https://online.fliphtml5.com/ORIONRACK/fafe/" target="_blank">📖 打开产品手册</a>
    </div>



    <!-- 切换逻辑 -->
    <script>
        let pages = document.querySelectorAll('.page');
        let btns = document.querySelectorAll('.nav button');

        function openPage(index) {
            pages.forEach((p, i) => {
                p.classList.toggle('active', i === index);
                btns[i].classList.toggle('active', i === index);
            });
        }
    </script>
</body>
</html>
